            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(155, 146, 201, 0.2);
        }
        .mesh-gradient {
            background-color: #131022;
            background-image: 
                radial-gradient(at 0% 0%, rgba(55, 19, 236, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(55, 19, 236, 0.1) 0px, transparent 50%);
        }
    </style>

<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-3">
<div class="size-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<svg class="text-white size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

</div>
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">NexusID</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Secure glassmorphism authentication</p>
</div>
<!-- Auth Card -->
<div class="glass-card rounded-xl p-8 shadow-2xl">
<!-- Toggle Login/Signup -->
<div class="flex p-1 bg-slate-200 dark:bg-primary/10 rounded-lg mb-8">
<button class="flex-1 py-2 text-sm font-bold rounded-md bg-white dark:bg-primary text-slate-900 dark:text-white shadow-sm transition-all">Login</button>
<button class="flex-1 py-2 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">Sign up</button>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<svg class="size-5" viewbox="0 0 24 24">

                    Continue with Google
                </button>
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">

</svg>
                    Continue with GitHub
                </button>
</div>
<!-- Separator -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700/50"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-transparent px-2 text-slate-500 dark:text-slate-400 font-bold tracking-widest">or</span>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg bg-white/50 dark:bg-primary/5 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="name@nexus.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg bg-white/50 dark:bg-primary/5 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-12 mt-2 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-base">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Info -->
<p class="text-center text-slate-500 dark:text-slate-400 text-xs px-8">
            By continuing, you agree to NexusID's 
            <a class="text-slate-900 dark:text-slate-300 font-bold hover:underline" href="#">Terms of Service</a> and 
            <a class="text-slate-900 dark:text-slate-300 font-bold hover:underline" href="#">Privacy Policy</a>.
        </p>
</div>
